[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/api/health/ready"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
rootDirectory = "/"
[services.deploy]
startCommand = "pnpm start --filter @verity/web"
healthcheckPath = "/api/health/ready"

[[services]]
name = "worker"
rootDirectory = "/"
[services.deploy]
startCommand = "pnpm start --filter @verity/worker"
# Worker doesn't have an HTTP healthcheck path, it relies on process health.
